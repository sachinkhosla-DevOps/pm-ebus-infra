# Kong API Gateway — Production / EKS values
# Chart: kong/kong  version: 3.4.0  Kong: 3.9
# Mode: PostgreSQL-backed (persistent config, Admin API, Kong Manager)

# ── Deployment mode ───────────────────────────────────────────────────────────
# DB-backed: config stored in PostgreSQL — survives pod restarts
# Enables: Admin API writes, Kong Manager UI, full plugin config at runtime
env:
  database: postgres
  pg_host:
    valueFrom:
      secretKeyRef:
        name: kong-postgres-secret
        key: host
  pg_port: "5432"
  pg_database: kong
  pg_user: kong
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-postgres-secret
        key: password
  pg_ssl: "on"

  # Tuning
  nginx_worker_processes: auto
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr
  log_level: notice

  # Tracing (OpenTelemetry → Jaeger/Tempo)
  tracing_instrumentations: all
  tracing_sampling_rate: "0.1"   # trace 10% of requests in prod

# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: kong
  tag: "3.9"
  pullPolicy: IfNotPresent

# ── Replicas + Autoscaling ────────────────────────────────────────────────────
replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# ── Pod placement ─────────────────────────────────────────────────────────────
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: kong
        topologyKey: kubernetes.io/hostname   # 1 Kong pod per node

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: kong

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ── Proxy — AWS NLB ───────────────────────────────────────────────────────────
proxy:
  enabled: true
  type: LoadBalancer
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  tls:
    enabled: true
    servicePort: 443
    containerPort: 8443
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    # Uncomment and set your ACM certificate ARN for TLS termination at NLB:
    # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-south-1:ACCOUNT:certificate/CERT-ID"
    # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"

# ── Admin API — internal only ─────────────────────────────────────────────────
admin:
  enabled: true
  type: ClusterIP           # NEVER expose Admin API externally in production
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  tls:
    enabled: true
    servicePort: 8444
    containerPort: 8444

# ── Kong Manager (Web UI) ─────────────────────────────────────────────────────
manager:
  enabled: true
  type: ClusterIP           # access via kubectl port-forward or internal ingress
  http:
    enabled: true
    servicePort: 8002
    containerPort: 8002
  tls:
    enabled: true
    servicePort: 8445
    containerPort: 8445

# ── Ingress Controller ────────────────────────────────────────────────────────
ingressController:
  enabled: true
  installCRDs: false
  env:
    controller_kong_admin_tls_skip_verify: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── PostgreSQL (external — use Patroni) ───────────────────────────────────────
# Kong uses Patroni cluster deployed in patroni namespace
postgresql:
  enabled: false            # use external Patroni PostgreSQL

# ── DB init migration job ─────────────────────────────────────────────────────
migrations:
  preUpgrade: true          # run `kong migrations up` before deploying new pods
  postUpgrade: true         # run `kong migrations finish` after

# ── TLS certificates via cert-manager ────────────────────────────────────────
certificates:
  enabled: true
  issuer:
    name: kong-ca-issuer
    kind: ClusterIssuer     # use ClusterIssuer for cross-namespace cert signing
  clusterIssuer:
    enabled: true
    name: kong-ca-issuer

# ── Metrics — Prometheus ──────────────────────────────────────────────────────
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s
  labels:
    release: prometheus

# Prometheus plugin — expose per-route metrics
plugins:
  configMaps: []
  secrets: []

# ── Health probes ─────────────────────────────────────────────────────────────
readinessProbe:
  httpGet:
    path: /status
    port: 8100
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /status
    port: 8100
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

# ── Update strategy — zero downtime rolling deploy ────────────────────────────
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
