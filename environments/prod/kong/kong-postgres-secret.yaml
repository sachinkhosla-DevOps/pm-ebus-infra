# IMPORTANT: Do NOT store real passwords in this file.
# Before Argo CD syncs Kong prod, create this secret manually on EKS:
#
#   kubectl create secret generic kong-postgres-secret \
#     --from-literal=host=patroni-cluster.patroni.svc.cluster.local \
#     --from-literal=password='STRONG_RANDOM_PASSWORD' \
#     -n kong
#
# Kong uses Patroni (already deployed) as its database.
# Create the kong database and user on Patroni first:
#
#   kubectl exec -n patroni patroni-cluster-1 -- psql -U postgres -c "
#     CREATE USER kong WITH PASSWORD 'STRONG_RANDOM_PASSWORD';
#     CREATE DATABASE kong OWNER kong;
#     GRANT ALL PRIVILEGES ON DATABASE kong TO kong;"
#
# This file is a reminder only — the actual secret is created out-of-band.
# Using Sealed Secrets or External Secrets Operator is recommended for production.
#
# Example with External Secrets (AWS Secrets Manager):
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kong-postgres-secret
  namespace: kong
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: kong-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: host
      remoteRef:
        key: pm-ebus/prod/kong
        property: pg_host
    - secretKey: password
      remoteRef:
        key: pm-ebus/prod/kong
        property: pg_password
