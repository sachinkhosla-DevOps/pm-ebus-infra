# Kafka Cluster — Production EKS (3-broker KRaft cluster)
# 3 dedicated controller nodes + 3 broker nodes = high availability
# Any single node can fail without data loss or downtime
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: controller
  namespace: kafka
  labels:
    strimzi.io/cluster: ebus-kafka
spec:
  replicas: 3
  roles:
    - controller
  storage:
    type: persistent-claim
    size: 50Gi
    class: gp3
    deleteClaim: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: kafka
  labels:
    strimzi.io/cluster: ebus-kafka
spec:
  replicas: 3
  roles:
    - broker
  storage:
    type: persistent-claim
    size: 200Gi
    class: gp3
    deleteClaim: false
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/name: ebus-kafka-broker
              topologyKey: kubernetes.io/hostname    # 1 broker per node
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: ebus-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: "3.9.0"
    metadataVersion: "3.9-IV0"
    replicas: 3

    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        type: loadbalancer
        tls: true
        configuration:
          bootstrap:
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: nlb
              service.beta.kubernetes.io/aws-load-balancer-internal: "true"

    config:
      offsets.topic.replication.factor: "3"
      transaction.state.log.replication.factor: "3"
      transaction.state.log.min.isr: "2"
      default.replication.factor: "3"
      min.insync.replicas: "2"
      log.retention.hours: "168"
      log.retention.bytes: "107374182400"   # 100GB per topic
      log.segment.bytes: "1073741824"
      num.partitions: "6"
      auto.create.topics.enable: "false"    # require explicit topic creation in prod
      compression.type: "lz4"

    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml

  entityOperator:
    topicOperator: {}
    userOperator: {}

  kafkaExporter:
    topicRegex: "ebus-.*"
    groupRegex: "ebus-.*"
---
# MirrorMaker2 — DC to DR replication (prod)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaMirrorMaker2
metadata:
  name: ebus-mirror
  namespace: kafka
spec:
  version: "3.9.0"
  replicas: 2        # 2 replicas for HA — one can fail during failover
  connectCluster: ebus-kafka-dr

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  clusters:
    - alias: ebus-kafka
      bootstrapServers: ebus-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
    - alias: ebus-kafka-dr
      bootstrapServers: REPLACE_WITH_DR_KAFKA_BOOTSTRAP:9092

  mirrors:
    - sourceCluster: ebus-kafka
      targetCluster: ebus-kafka-dr
      sourceConnector:
        config:
          replication.factor: "3"
          offset-syncs.topic.replication.factor: "3"
          topics: "ebus-.*"
          groups: "ebus-.*"
          replication.policy.class: "org.apache.kafka.connect.mirror.IdentityReplicationPolicy"
          sync.group.offsets.enabled: "true"
          sync.group.offsets.interval.seconds: "30"
          emit.heartbeats.enabled: "true"
          emit.checkpoints.enabled: "true"
      heartbeatConnector:
        config:
          heartbeats.topic.replication.factor: "3"
      checkpointConnector:
        config:
          checkpoints.topic.replication.factor: "3"
          sync.group.offsets.enabled: "true"
