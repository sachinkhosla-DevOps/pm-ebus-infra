# Kong API Gateway — Dev / Minikube values
# Chart: kong/kong  version: 3.4.0  Kong: 3.9
# Mode: PostgreSQL-backed (uses Patroni cluster in patroni namespace)
# DB: patroni-cluster.patroni.svc.cluster.local:5432  database: kong  user: kong

env:
  database: postgres
  pg_host:
    valueFrom:
      secretKeyRef:
        name: kong-postgres-secret
        key: host
  pg_port: "5432"
  pg_database: kong
  pg_user: kong
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-postgres-secret
        key: password
  pg_ssl: "on"
  pg_ssl_verify: "off"
  nginx_worker_processes: "1"
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  admin_gui_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr
  log_level: info

image:
  repository: kong
  tag: "3.9"

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Proxy — http://192.168.1.31:30085  /  Cloudflare tunnel
proxy:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
    nodePort: 30085
  tls:
    enabled: false

# Admin API — http://192.168.1.31:30081
admin:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
    nodePort: 30081
  tls:
    enabled: false

# Kong Manager UI — http://192.168.1.31:30082
manager:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 8002
    containerPort: 8002
    nodePort: 30082

ingressController:
  enabled: true
  installCRDs: false
  env:
    controller_kong_admin_tls_skip_verify: true

# Using external Patroni — do not deploy bundled Postgres
postgresql:
  enabled: false

migrations:
  preUpgrade: true
  postUpgrade: true
