# Kong API Gateway — Dev / Minikube values
# Chart: kong/kong  version: 3.4.0  Kong: 3.9
# Mode: DB-less (declarative config via ConfigMap — no PostgreSQL needed)
# NOTE: Values here are the reference. The Argo CD Application uses inline values
#       because Argo CD multi-source $values reference requires Argo CD 2.6+

env:
  database: "off"
  nginx_worker_processes: "1"
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr

dblessConfig:
  configMap: kong-config

image:
  repository: kong
  tag: "3.9"

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Proxy — main gateway traffic: http://192.168.1.31:30085
proxy:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
    nodePort: 30085
  tls:
    enabled: false

# Admin API — http://192.168.1.31:30081 (use only inside office network)
admin:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
    nodePort: 30081
  tls:
    enabled: false

# Kong Manager UI — http://192.168.1.31:30082
manager:
  enabled: true
  type: NodePort
  http:
    enabled: true
    servicePort: 8002
    containerPort: 8002
    nodePort: 30082

ingressController:
  enabled: true
  installCRDs: false
  env:
    controller_kong_admin_tls_skip_verify: true

postgresql:
  enabled: false
