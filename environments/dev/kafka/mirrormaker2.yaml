# Kafka MirrorMaker2 — DC to DR replication
# MirrorMaker2 continuously mirrors topics from DC Kafka → DR Kafka
# This is the Kafka equivalent of PostgreSQL logical replication
#
# DR flow:
#   DC (ebus-kafka @ kafka.kafka.svc:9092)
#     └─► MirrorMaker2 reads topics
#         └─► writes to DR Kafka (ebus-kafka-dr @ EKS)
#
# IMPORTANT: DR Kafka bootstrap address below is a placeholder.
# Replace with actual EKS Kafka bootstrap when DR cluster is deployed.
# Until then, this resource is suspended (spec.mirrors[].sourceConnector.config.replication.factor=0)
apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: ebus-mirror
  namespace: kafka
spec:
  version: "3.9.0"
  replicas: 1
  connectCluster: ebus-kafka-dr

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  clusters:
    # Source — DC Kafka (local Minikube)
    - alias: ebus-kafka
      bootstrapServers: ebus-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092

    # Target — DR Kafka (EKS) — replace bootstrap when DR is ready
    - alias: ebus-kafka-dr
      bootstrapServers: REPLACE_WITH_EKS_KAFKA_BOOTSTRAP:9092
      # bootstrapServers: ebus-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092  # self-test placeholder

  mirrors:
    - sourceCluster: ebus-kafka
      targetCluster: ebus-kafka-dr
      sourceConnector:
        config:
          replication.factor: "1"
          offset-syncs.topic.replication.factor: "1"
          # Mirror all ebus- prefixed topics
          topics: "ebus-.*"
          groups: "ebus-.*"
          # Prefix mirrored topics with source cluster alias on DR side
          replication.policy.separator: "."
          replication.policy.class: "org.apache.kafka.connect.mirror.IdentityReplicationPolicy"
          # Sync consumer group offsets so failover consumers resume from correct position
          sync.group.offsets.enabled: "true"
          sync.group.offsets.interval.seconds: "60"
          # Heartbeat for liveness monitoring
          emit.heartbeats.enabled: "true"
          emit.checkpoints.enabled: "true"
      heartbeatConnector:
        config:
          heartbeats.topic.replication.factor: "1"
      checkpointConnector:
        config:
          checkpoints.topic.replication.factor: "1"
          # How often to checkpoint consumer offsets to DR
          sync.group.offsets.enabled: "true"
