# Apache Superset 6.1.0 — PM-eBus ITMS Analytics
# Uses Patroni (PostgreSQL) as metadata DB and Valkey as cache/Celery broker

image:
  repository: apache/superset
  tag: "6.1.0"
  pullPolicy: IfNotPresent

# Disable bundled PostgreSQL and Redis — use our Patroni + Valkey
postgresql:
  enabled: false

redis:
  enabled: false

# Connection config for init container + app
supersetNode:
  connections:
    db_type: "postgresql"
    db_host: "patroni-cluster.patroni.svc.cluster.local"
    db_port: "5432"
    db_user: superset
    db_pass: "superset@PMeBus2026"
    db_name: superset
    redis_host: "valkey-primary.valkey.svc.cluster.local"
    redis_port: "6379"
    redis_user: ""
    redis_cache_db: "1"
    redis_celery_db: "0"
  resources:
    requests:
      cpu: 400m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

# Admin credentials
init:
  adminUser:
    username: admin
    password: "admin@PMeBus2026"
    firstname: PM-eBus
    lastname: Admin
    email: sachin.khosla@orahi.com

# Superset Python config overrides
configOverrides:
  secret_key: |
    SECRET_KEY = 'pmeBusSupersetSecretKey2026!@#'
  redis_auth: |
    CACHE_CONFIG = {
        'CACHE_TYPE': 'RedisCache',
        'CACHE_DEFAULT_TIMEOUT': 300,
        'CACHE_KEY_PREFIX': 'superset_',
        'CACHE_REDIS_URL': 'redis://:ebus%40Valkey2026@valkey-primary.valkey.svc.cluster.local:6379/1',
    }
    CELERY_CONFIG = {
        'broker_url': 'redis://:ebus%40Valkey2026@valkey-primary.valkey.svc.cluster.local:6379/0',
        'result_backend': 'redis://:ebus%40Valkey2026@valkey-primary.valkey.svc.cluster.local:6379/1',
    }
  feature_flags: |
    FEATURE_FLAGS = {
        "ENABLE_TEMPLATE_PROCESSING": True,
        "DASHBOARD_NATIVE_FILTERS": True,
        "DASHBOARD_CROSS_FILTERS": True,
        "ALERTS_ATTACH_REPORTS": True,
    }

# Service — NodePort for kubectl port-forward / access
service:
  type: NodePort
  port: 8088
  nodePort:
    http: 30088

# Celery worker
celeryWorker:
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

celeryBeat:
  enabled: true

flower:
  enabled: false
