apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strapi-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/sachinkhosla-DevOps/pm-ebus-infra.git
    targetRevision: HEAD
    path: environments/dev/strapi
  destination:
    server: https://kubernetes.default.svc
    namespace: strapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
