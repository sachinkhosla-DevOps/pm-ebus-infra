apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: superset-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://apache.github.io/superset
    chart: superset
    targetRevision: 0.17.2
    helm:
      valueFiles:
        - $values/environments/dev/superset/values.yaml
  sources:
    - repoURL: https://apache.github.io/superset
      chart: superset
      targetRevision: 0.17.2
      helm:
        valueFiles:
          - $values/environments/dev/superset/values.yaml
    - repoURL: https://github.com/sachinkhosla-DevOps/pm-ebus-infra.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: superset
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
