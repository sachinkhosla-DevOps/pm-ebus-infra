apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-config-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"    # after kong helm chart (wave 3)
spec:
  project: default

  source:
    repoURL: https://github.com/sachinkhosla-DevOps/pm-ebus-infra
    targetRevision: main
    path: environments/dev/kong
    # Only apply the configmap — not the namespace (already handled by kong app)
    directory:
      include: "kong-config.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
