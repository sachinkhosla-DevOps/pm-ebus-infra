apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: patroni-nightly-backup
  namespace: argo
spec:
  schedule: "0 2 * * *"
  timezone: "Asia/Kolkata"
  suspend: false
  workflowSpec:
    entrypoint: backup
    serviceAccountName: argo
    templates:
    - name: backup
      steps:
      - - name: dump-db
          template: pg-dump
      - - name: verify
          template: verify-dump

    - name: pg-dump
      container:
        image: postgres:16-alpine
        command: [sh, -c]
        args:
          - |
            pg_dump -h patroni-cluster.patroni.svc.cluster.local \
              -U postgres -d db_pm_ebus_test \
              -f /tmp/backup_$(date +%Y%m%d).sql && \
            echo "Backup size: $(du -sh /tmp/backup_$(date +%Y%m%d).sql)"
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres.patroni-cluster.credentials.postgresql.acid.zalan.do
              key: password

    - name: verify-dump
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            ls -lh /tmp/backup_*.sql && echo "Backup completed successfully"
